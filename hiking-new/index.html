<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="徒步中国 - 中国领先的户外徒步社区" />
  <title>徒步中国 - 户外徒步论坛</title>
</head>
<body>
  <div id="app"><div style="padding:40px;text-align:center;font-size:20px;color:#888;">徒步中国正在加载...</div></div>
  <script type="module">
    window.addEventListener('error', function(e) {
      document.getElementById('app').innerHTML = '<div style="padding:40px;color:red;font-family:monospace;"><h2>加载错误</h2><p>'+e.message+'</p><p style="font-size:12px">'+e.filename+':'+e.lineno+'</p></div>'
    })
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('app').innerHTML = '<div style="padding:40px;color:red;font-family:monospace;"><h2>Promise 错误</h2><p>'+e.reason+'</p></div>'
    })
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
